<svg xmlns="http://www.w3.org/2000/svg"
     width="800"
     height="960"
     viewBox="0 0 800 960">

  <!-- Background -->
  <rect width="800" height="960" fill="#ffffff"/>

  <!-- Outer Border -->
  <rect x="20" y="20" width="760" height="920"
        rx="24" ry="24"
        fill="none"
        stroke="#D40000"
        stroke-width="8"/>

  <!-- Header -->
  <g font-family="Arial, Helvetica, sans-serif"
     font-size="72"
     font-weight="bold"
     fill="#D40000"
     text-anchor="middle">

    <text x="100" y="105">B</text>
    <text x="260" y="105">I</text>
    <text x="420" y="105">N</text>
    <text x="580" y="105">G</text>
    <text x="740" y="105">O</text>
  </g>

  <!-- Grid -->
  <g stroke="#D40000" stroke-width="4">

    <!-- Vertical -->
    <line x1="20" y1="140" x2="780" y2="140"/>
    <line x1="180" y1="20" x2="180" y2="940"/>
    <line x1="340" y1="20" x2="340" y2="940"/>
    <line x1="500" y1="20" x2="500" y2="940"/>
    <line x1="660" y1="20" x2="660" y2="940"/>

    <!-- Horizontal -->
    <line x1="20" y1="300" x2="780" y2="300"/>
    <line x1="20" y1="460" x2="780" y2="460"/>
    <line x1="20" y1="620" x2="780" y2="620"/>
    <line x1="20" y1="780" x2="780" y2="780"/>
  </g>

  <!-- Numbers -->
  <g font-family="Arial, Helvetica, sans-serif"
     font-size="56"
     font-weight="bold"
     fill="#000000"
     text-anchor="middle"
     dominant-baseline="middle">

    <!-- Row 1 -->
    <text x="100" y="220">1</text>
    <text x="260" y="220">16</text>
    <text x="420" y="220">31</text>
    <text x="580" y="220">46</text>
    <text x="740" y="220">61</text>

    <!-- Row 2 -->
    <text x="100" y="380">2</text>
    <text x="260" y="380">17</text>
    <text x="420" y="380">32</text>
    <text x="580" y="380">47</text>
    <text x="740" y="380">62</text>

    <!-- Row 3 -->
    <text x="100" y="540">3</text>
    <text x="260" y="540">18</text>

    <!-- FREE -->
    <polygon fill="#D40000"
      points="
      420,485
      435,525
      478,525
      444,550
      458,592
      420,567
      382,592
      396,550
      362,525
      405,525"/>

    <text x="580" y="540">48</text>
    <text x="740" y="540">63</text>

    <!-- Row 4 -->
    <text x="100" y="700">4</text>
    <text x="260" y="700">19</text>
    <text x="420" y="700">34</text>
    <text x="580" y="700">49</text>
    <text x="740" y="700">64</text>

    <!-- Row 5 -->
    <text x="100" y="860">5</text>
    <text x="260" y="860">20</text>
    <text x="420" y="860">35</text>
    <text x="580" y="860">50</text>
    <text x="740" y="860">65</text>

  </g>

</svg>

