<svg width="520" height="580" viewBox="0 0 520 580" xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" role="img">
  <title id="title">Bingo Card</title>
  <desc id="desc">A standard 5×5 American Bingo card with B-I-N-G-O header and FREE space in the center.</desc>

  <!-- Card background -->
  <rect 
    x="20" y="20" width="480" height="540" 
    rx="15" ry="15"
    fill="#f8f1e3" stroke="#2c3e50" stroke-width="18"/>

  <!-- Header background -->
  <rect 
    x="35" y="35" width="450" height="80" 
    rx="8" ry="8"
    fill="#e74c3c" stroke="#2c3e50" stroke-width="8"/>

  <!-- BINGO letters -->
  <text x="85" y="85" font-family="Arial Black, sans-serif" font-size="62" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-4">B</text>
  <text x="180" y="85" font-family="Arial Black, sans-serif" font-size="62" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-4">I</text>
  <text x="275" y="85" font-family="Arial Black, sans-serif" font-size="62" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-4">N</text>
  <text x="370" y="85" font-family="Arial Black, sans-serif" font-size="62" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-4">G</text>
  <text x="465" y="85" font-family="Arial Black, sans-serif" font-size="62" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-4">O</text>

  <!-- Grid lines -->
  <!-- Vertical lines -->
  <line x1="120" y1="130" x2="120" y2="530" stroke="#2c3e50" stroke-width="8"/>
  <line x1="215" y1="130" x2="215" y2="530" stroke="#2c3e50" stroke-width="8"/>
  <line x1="310" y1="130" x2="310" y2="530" stroke="#2c3e50" stroke-width="8"/>
  <line x1="405" y1="130" x2="405" y2="530" stroke="#2c3e50" stroke-width="8"/>

  <!-- Horizontal lines -->
  <line x1="35" y1="210" x2="485" y2="210" stroke="#2c3e50" stroke-width="8"/>
  <line x1="35" y1="290" x2="485" y2="290" stroke="#2c3e50" stroke-width="8"/>
  <line x1="35" y1="370" x2="485" y2="370" stroke="#2c3e50" stroke-width="8"/>
  <line x1="35" y1="450" x2="485" y2="450" stroke="#2c3e50" stroke-width="8"/>

  <!-- Cell numbers (B column: 1-15) -->
  <text x="85"  y="170" font-family="Arial Black, sans-serif" font-size="42" font-weight="700" fill="#2c3e50" text-anchor="middle" dominant-baseline="middle">12</text>
  <text x="85"  y="250" font-family="Arial Black, sans-serif" font-size="42" font-weight="700" fill="#2c3e50" text-anchor="middle" dominant-baseline="middle">7</text>
  <text x="85"  y="330" font-family="Arial Black, sans-serif" font-size="42" font-weight="700" fill="#2c3e50" text-anchor="middle" dominant-baseline="middle">3</text>
  <text x="85"  y="410" font-family="Arial Black, sans-serif" font-size="42" font-weight="700" fill="#2c3e50" text-anchor="middle" dominant-baseline="middle">14</text>
  <text x="85"  y="490" font-family="Arial Black, sans-serif" font-size="42" font-weight="700" fill="#2c3e50" text-anchor="middle" dominant-baseline="middle">9</text>

  <!-- I column (16-30) -->
  <text x="180" y="170" font-family="Arial Black, sans-serif" font-size="42" font-weight="700" fill="#2c3e50" text-anchor="middle" dominant-baseline="middle">22</text>
  <text x="180" y="250" font-family="Arial Black, sans-serif" font-size="42" font-weight="700" fill="#2c3e50" text-anchor="middle" dominant-baseline="middle">19</text>
  <text x="180" y="330" font-family="Arial Black, sans-serif" font-size="42" font-weight="700" fill="#2c3e50" text-anchor="middle" dominant-baseline="middle">27</text>
  <text x="180" y="410" font-family="Arial Black, sans-serif" font-size="42" font-weight="700" fill="#2c3e50" text-anchor="middle" dominant-baseline="middle">16</text>
  <text x="180" y="490" font-family="Arial Black, sans-serif" font-size="42" font-weight="700" fill="#2c3e50" text-anchor="middle" dominant-baseline="middle">25</text>

  <!-- N column (31-45) -->
  <text x="275" y="170" font-family="Arial Black, sans-serif" font-size="42" font-weight="700" fill="#2c3e50" text-anchor="middle" dominant-baseline="middle">38</text>
  <text x="275" y="250" font-family="Arial Black, sans-serif" font-size="42" font-weight="700" fill="#2c3e50" text-anchor="middle" dominant-baseline="middle">33</text>
  
  <!-- FREE space -->
  <rect x="230" y="295" width="90" height="70" rx="8" ry="8" fill="#f1c40f" stroke="#2c3e50" stroke-width="8"/>
  <text x="275" y="335" font-family="Arial Black, sans-serif" font-size="26" font-weight="900" fill="#2c3e50" text-anchor="middle" dominant-baseline="middle">FREE</text>

  <text x="275" y="410" font-family="Arial Black, sans-serif" font-size="42" font-weight="700" fill="#2c3e50" text-anchor="middle" dominant-baseline="middle">44</text>
  <text x="275" y="490" font-family="Arial Black, sans-serif" font-size="42" font-weight="700" fill="#2c3e50" text-anchor="middle" dominant-baseline="middle">41</text>

  <!-- G column (46-60) -->
  <text x="370" y="170" font-family="Arial Black, sans-serif" font-size="42" font-weight="700" fill="#2c3e50" text-anchor="middle" dominant-baseline="middle">52</text>
